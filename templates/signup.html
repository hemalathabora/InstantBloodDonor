<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>

    <title>signup</title>

    <style>
        .custom-input:focus {
            border-color: #FF0000; /* Set the border color to red (#FF0000) on focus */
            box-shadow: 0 0 5px #FF0000; /* Optional: Add a box shadow to emphasize the focus */
        }
       * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}

#pad {
    padding-bottom: 10px;
}

h1 {
    text-align: center;
    padding-bottom: 10px;
}

a {
    text-decoration: none;
}

.image {
    background-image: url('360_F_113133044_6HtBFqhVhcnqS8R1urUV0VKBVh594GJ0.jpg');
    background-size: 100% 100%;
}

body {
    position: relative;
    align-items: center;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.form {
    position: relative;
    width: 100%;
    border-radius: 25px;
    box-shadow: -3px 3px 10px -5px rgba(0, 0, 0, 0.2);
    background: #f2f3f7;
    padding:15px 15px;
    max-width: 500px;
    background: transparent;
}

.form h2 {
    font-size: 30px;
    font-weight: 700;
}

form input[type="file"] {
    position: relative;
    height: 40px;
    width: 40px;
    opacity: 0;
    cursor: pointer;
    padding: 20px;
}

.form .inp {
    display: flex;
}

.form .inp .input:first-child {
    margin-right: 8px;
    width: 100%;
}

.form .inp .input:last-child {
    margin-right: 8px;
    width: 100%;
}

.form form .input input {
    height: 40px;
    width: 100%;
    font-size: 14px;
    padding: 0 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
}

.form form input.button {
    height: 45px;
    border: none;
    color: #f2f3f7;
    width: 100%;
    font-size: 17px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 13px;
    border: 2px;
}

.form .link {
    text-align: center;
    margin: 10px 0;
    font-size: 17px;
}

.form .link a {
    color: #2938aa;
    transition: 0.5s all;
}

.form .link a:hover {
    text-decoration: underline;
    color: red;
}
    </style>
</head>

<body class="image">

    <div class="form">
        <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        <form action="/signup" id="signupForm" method="POST" onsubmit="return validate()">
              <h1 clas="text-danger">Sign up</h1>
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <ul>
                {% for message in messages %}
                    <li style="color: {% if 'error' in message %}red{% else %}green{% endif %};">{{ message }}</li>
                {% endfor %}
                </ul>
              {% endif %}
              {% endwith %}
            <div class="inp">
                <div class="input" id="pad">
                    <label for="firstname">First Name</label>
                    <input type="text" name="fname"id="firstname" placeholder="first name" class="custom-input">
                    <span id="fn"class="text-danger"></span>
                </div>
                <div class="input" id="pad">
                    <label for="lastname">Last name</label>
                    <input type="text" name="lname"id="lastname" placeholder="last name" class="custom-input">
                    <span id="ln"class="text-danger"></span>
                </div>
            </div>
            <div class="input" id="pad">
                <label for="email">Email</label>
                <input type="email" class="custom-input" name="email"id="email"placeholder="enter your email" class="custom-input">
                <span id="emailid"class="text-danger"></span>
            </div>
            <div class="input" id="pad">
                <label for="phone">Phone no</label>
                <input type="text" class="custom-input" name="phoneno" id="phone"placeholder="phone number" class="custom-input">
                <span id="ph"class="text-danger"></span>
            </div>
            <div class="inp">
                <div class="input" id="pad">
                    <label for="pass">Password</label>
                    <input type="password" class="custom-input" name="pass"id="pass" placeholder="password" class="custom-input">
                    <span id="pswd"class="text-danger"></span>
                </div>
                <div class="input" id="pad">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" class="custom-input" name="pass1" id="confirm"placeholder="confirm password" class="custom-input">
                    <span id="cmpass"class="text-danger"></span>
                </div>
            </div>
            <div class="submit">
                <input type="submit" value="Sign up" class="button btn-danger">
            </div>
            <div class="link">Already a user? <a href="{{url_for('login')}}" style="text-decoration:none;" class="text-danger">Login Now</a></div>
        </form>
    </div>
        </div>
        <script>
</script>
</body>
</html>
